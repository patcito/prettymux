version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: dev.prettymux.app
    name: PrettyMux
    icon: utilities-terminal
    version: 0.1.0
    exec: usr/bin/prettymux

  files:
    include:
      - dist/prettymux
      - dist/libghostty.so
      - dist/welcome.html
      - dist/prettymux-shell-integration.sh
      - packaging/prettymux.desktop

  runtime:
    env:
      LD_LIBRARY_PATH: $APPDIR/usr/lib/prettymux:$LD_LIBRARY_PATH

  after_bundle: |
    mkdir -p $TARGET_APPDIR/usr/bin
    mkdir -p $TARGET_APPDIR/usr/lib/prettymux
    mkdir -p $TARGET_APPDIR/usr/share/prettymux
    cp dist/prettymux $TARGET_APPDIR/usr/bin/
    cp dist/libghostty.so $TARGET_APPDIR/usr/lib/prettymux/ || true
    cp dist/welcome.html $TARGET_APPDIR/usr/share/prettymux/
    cp dist/prettymux-shell-integration.sh $TARGET_APPDIR/usr/share/prettymux/shell-integration.sh
    cp packaging/prettymux.desktop $TARGET_APPDIR/usr/share/applications/prettymux.desktop

AppImage:
  update-information: gh-releases-zsync|patcito|prettymux|latest|PrettyMux-*x86_64.AppImage.zsync
  sign-key: None
  arch: x86_64
