app-id: dev.prettymux.app
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: prettymux
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home

modules:
  - name: ghostty
    buildsystem: simple
    build-commands:
      - install -Dm644 zig-out/lib/libghostty.so /app/lib/libghostty.so
      - cp -r include /app/include
      - mkdir -p /app/vendor
      - cp -r vendor/glad /app/vendor/glad
    sources:
      - type: dir
        path: ../ghostty

  - name: prettymux
    buildsystem: meson
    config-opts:
      - -Dghostty_dir=/app
    subdir: src/gtk
    post-install:
      - install -Dm644 prettymux-shell-integration.sh /app/share/prettymux/shell-integration.sh
      - install -Dm644 ../../packaging/prettymux.desktop /app/share/applications/dev.prettymux.app.desktop
    sources:
      - type: dir
        path: ..
