app-id: dev.prettymux.app
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: prettymux
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home

modules:
  - name: zig
    buildsystem: simple
    build-commands:
      - install -d /app/zig
      - cp -r * /app/zig/
    sources:
      - type: archive
        url: https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
        sha256: d45438b2573c5aa9e3b2bd4a4aa7e9c4db4b3aaed0ad4436e80bcb1553de648e

  - name: ghostty
    buildsystem: simple
    build-commands:
      - /app/zig/zig build -Dapp-runtime=none -Doptimize=ReleaseFast
      - install -Dm644 zig-out/lib/libghostty.so /app/lib/libghostty.so || true
    sources:
      - type: dir
        path: ../ghostty

  - name: prettymux
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DGHOSTTY_DIR=/run/build/ghostty
    subdir: src/qt
    post-install:
      - install -Dm644 welcome.html /app/share/prettymux/welcome.html
      - install -Dm644 prettymux-shell-integration.sh /app/share/prettymux/shell-integration.sh
      - install -Dm644 ../../packaging/prettymux.desktop /app/share/applications/dev.prettymux.app.desktop
    sources:
      - type: dir
        path: ..
