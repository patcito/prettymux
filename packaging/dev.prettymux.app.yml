app-id: dev.prettymux.app
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: prettymux
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home

modules:
  - name: ghostty
    buildsystem: simple
    build-commands:
      - install -Dm644 zig-out/lib/libghostty.so /app/zig-out/lib/libghostty.so
      - install -Dm644 zig-out/lib/libghostty.so /app/lib/prettymux/libghostty.so
      - cp -r include /app/include
      - mkdir -p /app/vendor
      - cp -r vendor/glad /app/vendor/glad
    sources:
      - type: dir
        path: ../ghostty

  - name: prettymux
    buildsystem: meson
    config-opts:
      - -Dghostty_dir=/app
    subdir: src/gtk
    post-install:
      - install -Dm644 /run/build/prettymux/src/gtk/prettymux-shell-integration.sh /app/share/prettymux/shell-integration.sh
      - install -Dm644 /run/build/prettymux/src/gtk/prettymux-bashrc.sh /app/share/prettymux/prettymux-bashrc.sh
      - install -Dm644 /run/build/prettymux/ghostty/src/shell-integration/bash/ghostty.bash /app/share/prettymux/ghostty.bash
      - install -Dm644 /run/build/prettymux/ghostty/src/shell-integration/bash/bash-preexec.sh /app/share/prettymux/bash-preexec.sh
      - install -Dm755 /run/build/prettymux/src/gtk/bin/open /app/share/prettymux/bin/open
      - install -Dm755 /run/build/prettymux/src/gtk/bin/xdg-open /app/share/prettymux/bin/xdg-open
      - install -Dm644 /run/build/prettymux/packaging/dev.prettymux.app.desktop /app/share/applications/dev.prettymux.app.desktop
      - install -Dm644 /run/build/prettymux/packaging/dev.prettymux.app.service /app/share/dbus-1/services/dev.prettymux.app.service
      - install -Dm644 /run/build/prettymux/packaging/prettymux.svg /app/share/icons/hicolor/scalable/apps/prettymux.svg
      - install -Dm644 /run/build/prettymux/packaging/prettymux.svg /app/share/icons/hicolor/scalable/apps/dev.prettymux.app.svg
    sources:
      - type: dir
        path: ..
