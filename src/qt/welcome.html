<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e2e; color: #cdd6f4;
  font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
  height: 100vh; display: flex; align-items: center; justify-content: center;
}
.container { text-align: center; max-width: 480px; padding: 40px; }
h1 { font-size: 48px; font-weight: 700; margin-bottom: 6px; letter-spacing: -1px; }
h1 span { color: #cba6f7; }
.subtitle { color: #585b70; font-size: 15px; margin-bottom: 48px; letter-spacing: 0.5px; }
.shortcuts { text-align: left; }
.shortcut {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid rgba(49,50,68,0.5);
}
.shortcut:last-child { border-bottom: none; }
.shortcut .label { color: #a6adc8; font-size: 14px; }
.shortcut .keys { display: flex; gap: 4px; }
kbd {
  background: #313244; color: #bac2de; padding: 4px 10px;
  border-radius: 6px; font-size: 11px; font-family: 'SF Mono', monospace;
  border: 1px solid #45475a; border-bottom: 2px solid #45475a;
}
.hint {
  color: #45475a; font-size: 13px; margin-top: 48px;
  transition: color 0.3s;
}
.hint kbd { background: #252536; border-color: #313244; color: #6c7086; }
</style>
</head>
<body>
<div class="container">
  <h1>pretty<span>mux</span></h1>
  <div class="subtitle">GPU-accelerated terminal multiplexer</div>

  <div class="shortcuts">
    <div class="shortcut">
      <span class="label">New workspace</span>
      <span class="keys"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>N</kbd></span>
    </div>
    <div class="shortcut">
      <span class="label">New terminal tab</span>
      <span class="keys"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>T</kbd></span>
    </div>
    <div class="shortcut">
      <span class="label">Toggle browser</span>
      <span class="keys"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>B</kbd></span>
    </div>
    <div class="shortcut">
      <span class="label">Copy / Paste</span>
      <span class="keys"><kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>C</kbd> / <kbd>V</kbd></span>
    </div>
  </div>

  <div class="hint">
    <kbd>Ctrl</kbd> <kbd>Shift</kbd> <kbd>K</kbd> for all shortcuts
  </div>
</div>
</body>
</html>
