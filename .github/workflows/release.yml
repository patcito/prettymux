name: CI + Packaging + Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      jobs:
        description: 'Jobs to run (comma-separated: ubuntu,fedora,deb,arch,snap,flatpak,appimage,windows,macos,ppa — or "all")'
        required: true
        type: string

env:
  GHOSTTY_REPO: patcito/ghostty
  GHOSTTY_BRANCH: linux-embedded-platform
  GHOSTTY_RELEASE: linux-embedded-v0.1.0
  ZIG_VERSION: '0.15.2'

jobs:
  # ---------------------------------------------------------------------------
  # Download prebuilt libghostty (shared by all Linux jobs)
  # ---------------------------------------------------------------------------
  fetch-libghostty:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'ubuntu') || contains(inputs.jobs, 'fedora') || contains(inputs.jobs, 'deb') || contains(inputs.jobs, 'arch') || contains(inputs.jobs, 'flatpak') || contains(inputs.jobs, 'appimage') || contains(inputs.jobs, 'linux')
    runs-on: ubuntu-latest
    steps:
      - name: Download prebuilt libghostty
        run: |
          gh release download ${{ env.GHOSTTY_RELEASE }} \
            --repo ${{ env.GHOSTTY_REPO }} \
            --pattern 'ghostty-linux-x86_64.tar.gz' \
            --pattern 'ghostty-glad.tar.gz'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Reconstruct ghostty directory layout
        run: |
          mkdir -p ghostty/zig-out ghostty/vendor
          tar xzf ghostty-linux-x86_64.tar.gz -C ghostty/
          mv ghostty/lib ghostty/zig-out/lib
          tar xzf ghostty-glad.tar.gz -C ghostty/vendor/
          echo "Layout:"
          find ghostty -type f | head -20

      - name: Upload ghostty tree
        uses: actions/upload-artifact@v6
        with:
          name: ghostty-prebuilt
          path: ghostty/

  # ---------------------------------------------------------------------------
  # Ubuntu 24.04 LTS
  # ---------------------------------------------------------------------------
  build-linux-ubuntu-lts:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'ubuntu') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-ubuntu:24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Resolve ghostty directory
        run: |
          GHOSTTY_DIR="${GITHUB_WORKSPACE}/ghostty"
          if [ -d "${GHOSTTY_DIR}/ghostty/include" ]; then
            GHOSTTY_DIR="${GHOSTTY_DIR}/ghostty"
          fi
          test -d "${GHOSTTY_DIR}/include"
          test -f "${GHOSTTY_DIR}/vendor/glad/src/gl.c"
          echo "GHOSTTY_DIR=${GHOSTTY_DIR}" >> "$GITHUB_ENV"
          find "${GHOSTTY_DIR}" -type f | head -20

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir="${GHOSTTY_DIR}"
          ninja -C builddir

      - name: Package artifacts
        run: |
          mkdir -p dist/usr/bin dist/usr/lib/prettymux dist/usr/share/prettymux/bin \
            dist/usr/share/applications dist/usr/share/icons/hicolor/scalable/apps
          cp src/gtk/builddir/prettymux dist/usr/bin/
          cp src/gtk/builddir/prettymux-open dist/usr/bin/ || true
          cp src/gtk/prettymux-shell-integration.sh dist/usr/share/prettymux/shell-integration.sh || true
          cp src/gtk/prettymux-bashrc.sh dist/usr/share/prettymux/prettymux-bashrc.sh || true
          cp src/gtk/bin/open dist/usr/share/prettymux/bin/open || true
          cp src/gtk/bin/xdg-open dist/usr/share/prettymux/bin/xdg-open || true
          cp ghostty/zig-out/lib/libghostty.so dist/usr/lib/prettymux/ || true
          cp packaging/prettymux.desktop dist/usr/share/applications/
          cp packaging/prettymux.svg dist/usr/share/icons/hicolor/scalable/apps/
          tar czf prettymux-ubuntu-24.04-amd64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-ubuntu-24.04-amd64
          path: prettymux-ubuntu-24.04-amd64.tar.gz

  # ---------------------------------------------------------------------------
  # Fedora (RPM)
  # ---------------------------------------------------------------------------
  build-linux-fedora:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'fedora') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-fedora:42
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Verify ghostty layout
        run: |
          echo "pwd: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          ls -la ghostty/vendor/glad/src/ || echo "glad not found at relative path"
          ls -la $GITHUB_WORKSPACE/ghostty/vendor/glad/src/ || echo "glad not found at GITHUB_WORKSPACE path"
          find ghostty -type f | head -20

      - name: Build prettymux
        run: |
          echo "pwd: $(pwd)"
          ls -la ghostty/vendor/glad/src/gl.c || echo "gl.c not found"
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=$(cd $GITHUB_WORKSPACE && pwd)/ghostty
          ninja -C builddir

      - name: Package artifacts
        run: |
          mkdir -p dist/bin
          cp src/gtk/builddir/prettymux dist/
          cp src/gtk/builddir/prettymux-open dist/ || true
          cp src/gtk/prettymux-shell-integration.sh dist/ || true
          cp src/gtk/prettymux-bashrc.sh dist/ || true
          cp src/gtk/bin/open dist/bin/open || true
          cp src/gtk/bin/xdg-open dist/bin/xdg-open || true
          cp ghostty/zig-out/lib/libghostty.so dist/ || true

      - name: Build RPM
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then VERSION="0.1.0"; fi
          export VERSION
          nfpm package -p rpm -f packaging/nfpm.yaml
          mv *.rpm prettymux-${VERSION}-1.x86_64.rpm

      - name: Upload RPM
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-fedora-rpm
          path: '*.rpm'

  # ---------------------------------------------------------------------------
  # Debian package (.deb)
  # ---------------------------------------------------------------------------
  build-linux-deb:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'deb') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-ubuntu:24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Resolve ghostty directory
        run: |
          GHOSTTY_DIR="${GITHUB_WORKSPACE}/ghostty"
          if [ -d "${GHOSTTY_DIR}/ghostty/include" ]; then
            GHOSTTY_DIR="${GHOSTTY_DIR}/ghostty"
          fi
          test -d "${GHOSTTY_DIR}/include"
          test -f "${GHOSTTY_DIR}/vendor/glad/src/gl.c"
          echo "GHOSTTY_DIR=${GHOSTTY_DIR}" >> "$GITHUB_ENV"
          find "${GHOSTTY_DIR}" -type f | head -20

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir="${GHOSTTY_DIR}"
          ninja -C builddir

      - name: Package artifacts
        run: |
          mkdir -p dist/bin
          cp src/gtk/builddir/prettymux dist/
          cp src/gtk/builddir/prettymux-open dist/ || true
          cp src/gtk/prettymux-shell-integration.sh dist/ || true
          cp src/gtk/prettymux-bashrc.sh dist/ || true
          cp src/gtk/bin/open dist/bin/open || true
          cp src/gtk/bin/xdg-open dist/bin/xdg-open || true
          cp ghostty/zig-out/lib/libghostty.so dist/ || true

      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then VERSION="0.1.0"; fi
          export VERSION
          nfpm package -p deb -f packaging/nfpm.yaml
          mv *.deb prettymux_${VERSION}_amd64.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-deb
          path: '*.deb'

  # ---------------------------------------------------------------------------
  # Snap
  # ---------------------------------------------------------------------------
  build-snap:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'snap') || contains(inputs.jobs, 'linux')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Checkout ghostty fork
        uses: actions/checkout@v5
        with:
          repository: ${{ env.GHOSTTY_REPO }}
          ref: ${{ env.GHOSTTY_BRANCH }}
          path: ghostty

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft
        # snapcraft.yaml handles full build inside the snap environment

      - name: Upload snap
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-snap
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: edge

  # ---------------------------------------------------------------------------
  # Flatpak
  # ---------------------------------------------------------------------------
  build-flatpak:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'flatpak') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Install Flatpak Builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/dev.prettymux.app.yml
          bundle: prettymux.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-flatpak
          path: prettymux.flatpak

  # ---------------------------------------------------------------------------
  # Arch Linux
  # ---------------------------------------------------------------------------
  build-archlinux:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'arch') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-archlinux:latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=$GITHUB_WORKSPACE/ghostty
          ninja -C builddir

      - name: Create Arch package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [[ "$VERSION" =~ ^[0-9] ]] || VERSION="0.1.0"

          PKGDIR="prettymux-pkg"
          mkdir -p "$PKGDIR/usr/bin"
          mkdir -p "$PKGDIR/usr/lib/prettymux"
          mkdir -p "$PKGDIR/usr/share/prettymux/bin"
          mkdir -p "$PKGDIR/usr/share/applications"
          mkdir -p "$PKGDIR/usr/share/icons/hicolor/scalable/apps"

          install -Dm755 src/gtk/builddir/prettymux "$PKGDIR/usr/bin/prettymux"
          install -Dm755 src/gtk/builddir/prettymux-open "$PKGDIR/usr/bin/prettymux-open" || true
          install -Dm644 ghostty/zig-out/lib/libghostty.so "$PKGDIR/usr/lib/prettymux/libghostty.so" || true

          install -Dm644 src/gtk/prettymux-shell-integration.sh "$PKGDIR/usr/share/prettymux/shell-integration.sh" || true
          install -Dm644 src/gtk/prettymux-bashrc.sh "$PKGDIR/usr/share/prettymux/prettymux-bashrc.sh" || true
          install -Dm755 src/gtk/bin/open "$PKGDIR/usr/share/prettymux/bin/open" || true
          install -Dm755 src/gtk/bin/xdg-open "$PKGDIR/usr/share/prettymux/bin/xdg-open" || true
          install -Dm644 packaging/prettymux.desktop "$PKGDIR/usr/share/applications/prettymux.desktop"
          install -Dm644 packaging/prettymux.svg "$PKGDIR/usr/share/icons/hicolor/scalable/apps/prettymux.svg"
          install -Dm644 LICENSE "$PKGDIR/usr/share/licenses/prettymux/LICENSE"

          printf '%s\n' \
            "pkgname = prettymux" \
            "pkgver = ${VERSION}-1" \
            "pkgdesc = GPU-accelerated terminal multiplexer" \
            "url = https://github.com/patcito/prettymux" \
            "builddate = $(date +%s)" \
            "packager = GitHub Actions <ci@prettymux.dev>" \
            "size = $(du -sb "$PKGDIR" | cut -f1)" \
            "arch = x86_64" \
            "license = GPL-3.0-only" \
            "depend = gtk4" \
            "depend = libadwaita" \
            "depend = webkitgtk-6.0" \
            "depend = json-glib" \
            > "$PKGDIR/.PKGINFO"

          cd "$PKGDIR"
          tar --zstd -cf ../prettymux-${VERSION}-1-x86_64.pkg.tar.zst .PKGINFO usr/

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-archlinux
          path: '*.pkg.tar.zst'

      - name: Upload PKGBUILD
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-pkgbuild
          path: packaging/PKGBUILD

      - name: Publish to AUR
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && env.AUR_SSH_PRIVATE_KEY != ''
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          pacman -Sy --noconfirm --needed openssh
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -H -t rsa,ecdsa,ed25519 aur.archlinux.org > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

          export GIT_SSH_COMMAND='ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts'
          git config --global user.name "prettymux-bot"
          git config --global user.email "prettymux-bot@users.noreply.github.com"

          rm -rf /tmp/aur-prettymux
          git clone ssh://aur@aur.archlinux.org/prettymux.git /tmp/aur-prettymux

          cp packaging/PKGBUILD /tmp/aur-prettymux/PKGBUILD
          (
            cd /tmp/aur-prettymux
            makepkg --printsrcinfo > .SRCINFO
            git add PKGBUILD .SRCINFO
            if git diff --cached --quiet; then
              echo "No AUR changes to publish"
              exit 0
            fi
            git commit -m "Update PKGBUILD and .SRCINFO"
            git push origin master
          )

  # ---------------------------------------------------------------------------
  # Publish to PPA (Ubuntu)
  # ---------------------------------------------------------------------------
  publish-ppa:
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && (inputs.jobs == 'all' || contains(inputs.jobs, 'ppa'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        run: |
          mkdir -p ghostty/zig-out ghostty/vendor
          gh release download ${{ env.GHOSTTY_RELEASE }} \
            --repo ${{ env.GHOSTTY_REPO }} \
            --pattern 'ghostty-linux-x86_64.tar.gz' \
            --pattern 'ghostty-glad.tar.gz'
          tar xzf ghostty-linux-x86_64.tar.gz -C ghostty/
          mv ghostty/lib ghostty/zig-out/lib
          tar xzf ghostty-glad.tar.gz -C ghostty/vendor/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create source tarball
        run: |
          VERSION=$(dpkg-parsechangelog -l packaging/debian/changelog --show-field Version 2>/dev/null | cut -d- -f1)
          if [ -z "$VERSION" ]; then
            VERSION=${GITHUB_REF_NAME#v}
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION=$(sed -n "s/^[[:space:]]*version: '\\([^']*\\)'.*/\\1/p" src/gtk/meson.build | head -1)
          fi
          if [ -z "$VERSION" ]; then
            VERSION="0.2.0"
          fi
          PPA_REVISION=$((GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT - 1))
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PPA_REVISION=$PPA_REVISION" >> $GITHUB_ENV
          # Verify ghostty lib exists before tarball
          ls -la ghostty/zig-out/lib/
          tar czf prettymux_${VERSION}.orig.tar.gz \
            --transform "s,^,prettymux-${VERSION}/," \
            --exclude='.git' --exclude='builddir' --exclude='node_modules' \
            src/ packaging/ ghostty/ LICENSE

      - name: Publish to PPA
        if: env.GPG_PRIVATE_KEY != ''
        uses: yuezk/publish-ppa-package@main
        with:
          repository: patcito/prettymux
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          tarball: prettymux_${{ env.VERSION }}.orig.tar.gz
          debian_dir: packaging/debian
          deb_email: patcito@gmail.com
          deb_fullname: Patrick Aljord
          series: noble
          revision: ${{ env.PPA_REVISION }}
          keep_changelog: true
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  # ---------------------------------------------------------------------------
  # AppImage
  # ---------------------------------------------------------------------------
  build-appimage:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'appimage') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v5
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev libjson-glib-dev meson ninja-build

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=${{ github.workspace }}/ghostty
          ninja -C builddir

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib/prettymux
          mkdir -p AppDir/usr/share/prettymux/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp src/gtk/builddir/prettymux AppDir/usr/bin/
          cp src/gtk/builddir/prettymux-open AppDir/usr/bin/ || true
          cp ghostty/zig-out/lib/libghostty.so AppDir/usr/lib/prettymux/ || true
          cp src/gtk/prettymux-shell-integration.sh AppDir/usr/share/prettymux/shell-integration.sh || true
          cp src/gtk/prettymux-bashrc.sh AppDir/usr/share/prettymux/prettymux-bashrc.sh || true
          cp src/gtk/bin/open AppDir/usr/share/prettymux/bin/open || true
          cp src/gtk/bin/xdg-open AppDir/usr/share/prettymux/bin/xdg-open || true
          cp packaging/prettymux.desktop AppDir/usr/share/applications/prettymux.desktop
          cp packaging/prettymux.svg AppDir/usr/share/icons/hicolor/scalable/apps/prettymux.svg

      - name: Build AppImage
        uses: AppImageCrafters/build-appimage@v1
        with:
          recipe: packaging/AppImageBuilder.yml
        env:
          UPDATE_INFO: gh-releases-zsync|patcito|prettymux|latest|PrettyMux-*x86_64.AppImage.zsync

      - name: Upload AppImage
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-appimage
          path: '*.AppImage'

  # ---------------------------------------------------------------------------
  # Windows (x64)
  # ---------------------------------------------------------------------------
  build-windows:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'windows')
    runs-on: windows-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-json-glib
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-tools-git

      - name: Download prebuilt ghostty
        shell: bash
        run: |
          mkdir -p ghostty/zig-out/lib ghostty/vendor
          gh release download ${{ env.GHOSTTY_RELEASE }} \
            --repo ${{ env.GHOSTTY_REPO }} \
            --pattern 'ghostty-windows-x86_64.tar.gz' \
            --pattern 'ghostty-glad.tar.gz'
          tar xzf ghostty-windows-x86_64.tar.gz -C ghostty/
          mv ghostty/ghostty.dll ghostty/zig-out/lib/ghostty.dll || true
          mv ghostty/ghostty.lib ghostty/zig-out/lib/ghostty.lib || true
          [ -d ghostty/lib ] && mv ghostty/lib/* ghostty/zig-out/lib/ || true
          tar xzf ghostty-glad.tar.gz -C ghostty/vendor/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download WebView2 SDK
        shell: bash
        run: |
          curl -fsSLo webview2.nupkg https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2903.40
          python - <<'PY'
          import pathlib
          import zipfile

          out = pathlib.Path('webview2')
          with zipfile.ZipFile('webview2.nupkg') as zf:
              for name in zf.namelist():
                  if name.startswith('build/native/'):
                      zf.extract(name, out)
          PY

      - name: Create MinGW ghostty import library
        shell: msys2 {0}
        run: |
          cd ghostty/zig-out/lib
          if [ -f ghostty.dll ] && [ ! -f libghostty.dll.a ]; then
            gendef ghostty.dll
            dlltool -d ghostty.def -D ghostty.dll -l libghostty.dll.a
          fi

      - name: Build prettymux
        shell: msys2 {0}
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir="${{ github.workspace }}/ghostty" \
            -Dwebview2_sdk_dir="${{ github.workspace }}/webview2"
          ninja -C builddir

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp src/gtk/builddir/prettymux.exe dist/
          cp ghostty/zig-out/lib/ghostty.dll dist/ || true
          cp webview2/build/native/x64/WebView2Loader.dll dist/ || true
          powershell -NoLogo -NoProfile -Command "Compress-Archive -Path dist/* -DestinationPath prettymux-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-windows-x64
          path: prettymux-windows-x64.zip

  # ---------------------------------------------------------------------------
  # macOS ARM64 (Apple Silicon)
  # ---------------------------------------------------------------------------
  build-macos:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'macos')
    runs-on: macos-14
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Checkout ghostty fork
        uses: actions/checkout@v5
        with:
          repository: ${{ env.GHOSTTY_REPO }}
          ref: ${{ env.GHOSTTY_BRANCH }}
          path: ghostty

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install GTK4 stack via Homebrew
        run: |
          brew install gtk4 libadwaita json-glib meson ninja pkg-config

      - name: Build ghostty
        run: |
          cd ghostty
          for attempt in 1 2 3; do
            if zig build -Dapp-runtime=none -Demit-macos-app=false -Demit-xcframework=true -Doptimize=ReleaseFast; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            rm -rf .zig-cache
            sleep $((attempt * 5))
          done

      - name: Inspect ghostty outputs
        run: |
          find ghostty -maxdepth 4 \( -name 'GhosttyKit.xcframework' -o -name 'libghostty.dylib' \)

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir -Dghostty_dir=${{ github.workspace }}/ghostty
          ninja -C builddir

      - name: Package macOS app
        run: |
          mkdir -p dist
          cp src/gtk/builddir/prettymux dist/
          cp src/gtk/builddir/prettymux-open dist/ 2>/dev/null || true
          tar czf prettymux-macos-arm64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: prettymux-macos-arm64
          path: prettymux-macos-arm64.tar.gz

