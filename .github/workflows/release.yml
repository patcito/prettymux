name: CI + Packaging + Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      jobs:
        description: 'Jobs to run (comma-separated: ubuntu,fedora,deb,arch,snap,flatpak,appimage,windows,macos,ppa — or "all")'
        required: true
        type: string

env:
  GHOSTTY_REPO: patcito/ghostty
  GHOSTTY_BRANCH: linux-embedded-platform
  GHOSTTY_RELEASE: linux-embedded-v0.1.0
  ZIG_VERSION: '0.15.2'

jobs:
  # ---------------------------------------------------------------------------
  # Download prebuilt libghostty (shared by all Linux jobs)
  # ---------------------------------------------------------------------------
  fetch-libghostty:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'ubuntu') || contains(inputs.jobs, 'fedora') || contains(inputs.jobs, 'deb') || contains(inputs.jobs, 'arch') || contains(inputs.jobs, 'appimage') || contains(inputs.jobs, 'linux')
    runs-on: ubuntu-latest
    steps:
      - name: Download prebuilt libghostty
        run: |
          gh release download ${{ env.GHOSTTY_RELEASE }} \
            --repo ${{ env.GHOSTTY_REPO }} \
            --pattern 'ghostty-linux-x86_64.tar.gz' \
            --pattern 'ghostty-glad.tar.gz'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Reconstruct ghostty directory layout
        run: |
          mkdir -p ghostty/zig-out ghostty/vendor
          tar xzf ghostty-linux-x86_64.tar.gz -C ghostty/
          mv ghostty/lib ghostty/zig-out/lib
          tar xzf ghostty-glad.tar.gz -C ghostty/vendor/
          echo "Layout:"
          find ghostty -type f | head -20

      - name: Upload ghostty tree
        uses: actions/upload-artifact@v4
        with:
          name: ghostty-prebuilt
          path: ghostty/

  # ---------------------------------------------------------------------------
  # Ubuntu 24.04 LTS
  # ---------------------------------------------------------------------------
  build-linux-ubuntu-lts:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'ubuntu') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v4
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev libjson-glib-dev meson ninja-build

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=${{ github.workspace }}/ghostty
          ninja -C builddir

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp src/gtk/builddir/prettymux dist/
          cp src/gtk/builddir/prettymux-open dist/ || true

          cp src/gtk/prettymux-shell-integration.sh dist/ || true
          cp ghostty/zig-out/lib/libghostty.so dist/ || true
          tar czf prettymux-ubuntu-24.04-amd64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-ubuntu-24.04-amd64
          path: prettymux-ubuntu-24.04-amd64.tar.gz

  # ---------------------------------------------------------------------------
  # Fedora (RPM)
  # ---------------------------------------------------------------------------
  build-linux-fedora:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'fedora') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install base tools
        run: dnf install -y git which tar

      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v4
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Verify ghostty layout
        run: |
          echo "pwd: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          ls -la ghostty/vendor/glad/src/ || echo "glad not found at relative path"
          ls -la $GITHUB_WORKSPACE/ghostty/vendor/glad/src/ || echo "glad not found at GITHUB_WORKSPACE path"
          find ghostty -type f | head -20

      - name: Install dependencies
        run: |
          dnf install -y \
            gtk4-devel libadwaita-devel webkitgtk6.0-devel json-glib-devel \
            meson ninja-build gcc-c++

      - name: Build prettymux
        run: |
          echo "pwd: $(pwd)"
          ls -la ghostty/vendor/glad/src/gl.c || echo "gl.c not found"
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=$(cd $GITHUB_WORKSPACE && pwd)/ghostty
          ninja -C builddir

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp src/gtk/builddir/prettymux dist/
          cp src/gtk/builddir/prettymux-open dist/ || true
          cp src/gtk/prettymux-shell-integration.sh dist/ || true
          cp ghostty/zig-out/lib/libghostty.so dist/ || true

      - name: Install nFPM
        run: |
          NFPM_VERSION=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest | grep tag_name | cut -d'"' -f4 | sed 's/^v//')
          curl -sL -o /tmp/nfpm.rpm "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm-${NFPM_VERSION}-1.x86_64.rpm"
          dnf install -y /tmp/nfpm.rpm

      - name: Build RPM
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then VERSION="0.1.0"; fi
          export VERSION
          nfpm package -p rpm -f packaging/nfpm.yaml
          mv *.rpm prettymux-${VERSION}-1.x86_64.rpm

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-fedora-rpm
          path: '*.rpm'

  # ---------------------------------------------------------------------------
  # Debian package (.deb)
  # ---------------------------------------------------------------------------
  build-linux-deb:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'deb') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v4
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev libjson-glib-dev meson ninja-build

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=${{ github.workspace }}/ghostty
          ninja -C builddir

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp src/gtk/builddir/prettymux dist/
          cp src/gtk/builddir/prettymux-open dist/ || true
          cp src/gtk/prettymux-shell-integration.sh dist/ || true
          cp ghostty/zig-out/lib/libghostty.so dist/ || true

      - name: Install nFPM
        run: |
          NFPM_VERSION=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest | grep tag_name | cut -d'"' -f4 | sed 's/^v//')
          curl -sL -o /tmp/nfpm.deb "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then VERSION="0.1.0"; fi
          export VERSION
          nfpm package -p deb -f packaging/nfpm.yaml
          mv *.deb prettymux_${VERSION}_amd64.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-deb
          path: '*.deb'

  # ---------------------------------------------------------------------------
  # Snap
  # ---------------------------------------------------------------------------
  build-snap:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'snap') || contains(inputs.jobs, 'linux')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Checkout ghostty fork
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GHOSTTY_REPO }}
          ref: ${{ env.GHOSTTY_BRANCH }}
          path: ghostty

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft
        # snapcraft.yaml handles full build inside the snap environment

      - name: Upload snap
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-snap
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: edge

  # ---------------------------------------------------------------------------
  # Flatpak
  # ---------------------------------------------------------------------------
  build-flatpak:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'flatpak') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v4
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Install Flatpak Builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//46 org.gnome.Sdk//46

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/dev.prettymux.app.yml
          bundle: prettymux.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-flatpak
          path: prettymux.flatpak

  # ---------------------------------------------------------------------------
  # Arch Linux
  # ---------------------------------------------------------------------------
  build-archlinux:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'arch') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install base tools
        run: pacman -Syu --noconfirm base-devel git curl zstd

      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v4
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Install dependencies
        run: pacman -S --noconfirm gtk4 libadwaita webkit2gtk-6.0 json-glib meson ninja gcc

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=$GITHUB_WORKSPACE/ghostty
          ninja -C builddir

      - name: Create Arch package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [[ "$VERSION" =~ ^[0-9] ]] || VERSION="0.1.0"

          PKGDIR="prettymux-pkg"
          mkdir -p "$PKGDIR/usr/bin"
          mkdir -p "$PKGDIR/usr/lib/prettymux"
          mkdir -p "$PKGDIR/usr/share/prettymux"
          mkdir -p "$PKGDIR/usr/share/applications"

          install -Dm755 src/gtk/builddir/prettymux "$PKGDIR/usr/bin/prettymux"
          install -Dm755 src/gtk/builddir/prettymux-open "$PKGDIR/usr/bin/prettymux-open" || true
          install -Dm644 ghostty/zig-out/lib/libghostty.so "$PKGDIR/usr/lib/prettymux/libghostty.so" || true

          install -Dm644 src/gtk/prettymux-shell-integration.sh "$PKGDIR/usr/share/prettymux/shell-integration.sh" || true
          install -Dm644 packaging/prettymux.desktop "$PKGDIR/usr/share/applications/prettymux.desktop"
          install -Dm644 LICENSE "$PKGDIR/usr/share/licenses/prettymux/LICENSE"

          cat > "$PKGDIR/.PKGINFO" << 'PKGEOF'
pkgname = prettymux
pkgdesc = GPU-accelerated terminal multiplexer
url = https://github.com/patcito/prettymux
arch = x86_64
license = GPL-3.0-only
depend = gtk4
depend = libadwaita
depend = webkit2gtk-6.0
depend = json-glib
PKGEOF
          # Set dynamic fields
          sed -i "1a pkgver = ${VERSION}-1" "$PKGDIR/.PKGINFO"
          echo "builddate = $(date +%s)" >> "$PKGDIR/.PKGINFO"
          echo "packager = GitHub Actions <ci@prettymux.dev>" >> "$PKGDIR/.PKGINFO"
          echo "size = $(du -sb "$PKGDIR" | cut -f1)" >> "$PKGDIR/.PKGINFO"

          cd "$PKGDIR"
          tar --zstd -cf ../prettymux-${VERSION}-1-x86_64.pkg.tar.zst .PKGINFO usr/

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-archlinux
          path: '*.pkg.tar.zst'

      - name: Upload PKGBUILD
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-pkgbuild
          path: packaging/PKGBUILD

      - name: Publish to AUR
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && env.AUR_SSH_PRIVATE_KEY != ''
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: prettymux
          pkgbuild: packaging/PKGBUILD
          commit_username: prettymux-bot
          commit_email: prettymux-bot@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  # ---------------------------------------------------------------------------
  # Publish to PPA (Ubuntu)
  # ---------------------------------------------------------------------------
  publish-ppa:
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && (inputs.jobs == 'all' || contains(inputs.jobs, 'ppa'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Download prebuilt ghostty
        run: |
          mkdir -p ghostty/zig-out ghostty/vendor
          gh release download ${{ env.GHOSTTY_RELEASE }} \
            --repo ${{ env.GHOSTTY_REPO }} \
            --pattern 'ghostty-linux-x86_64.tar.gz' \
            --pattern 'ghostty-glad.tar.gz'
          tar xzf ghostty-linux-x86_64.tar.gz -C ghostty/
          mv ghostty/lib ghostty/zig-out/lib
          tar xzf ghostty-glad.tar.gz -C ghostty/vendor/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create source tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Default version for workflow_dispatch (no tag)
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="0.1.0~git$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          tar czf prettymux-${VERSION}.tar.gz \
            --transform "s,^,prettymux-${VERSION}/," \
            --exclude='.git' --exclude='build' \
            src/ packaging/ ghostty/ LICENSE

      - name: Publish to PPA
        if: env.GPG_PRIVATE_KEY != ''
        uses: yuezk/publish-ppa-package@main
        with:
          repository: patcito/prettymux
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
          tarball: prettymux-${{ env.VERSION }}.tar.gz
          debian_dir: packaging/debian
          deb_email: patcito@gmail.com
          deb_fullname: Patrick Aljord
          series: noble
          keep_changelog: true
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

  # ---------------------------------------------------------------------------
  # AppImage
  # ---------------------------------------------------------------------------
  build-appimage:
    if: github.event_name == 'push' || inputs.jobs == 'all' || contains(inputs.jobs, 'appimage') || contains(inputs.jobs, 'linux')
    needs: fetch-libghostty
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v4

      - name: Download prebuilt ghostty
        uses: actions/download-artifact@v4
        with:
          name: ghostty-prebuilt
          path: ghostty

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev libjson-glib-dev meson ninja-build

      - name: Build prettymux
        run: |
          cd src/gtk
          meson setup builddir \
            -Dghostty_dir=${{ github.workspace }}/ghostty
          ninja -C builddir

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib/prettymux
          mkdir -p AppDir/usr/share/prettymux
          mkdir -p AppDir/usr/share/applications
          cp src/gtk/builddir/prettymux AppDir/usr/bin/
          cp src/gtk/builddir/prettymux-open AppDir/usr/bin/ || true
          cp ghostty/zig-out/lib/libghostty.so AppDir/usr/lib/prettymux/ || true
          cp src/gtk/prettymux-shell-integration.sh AppDir/usr/share/prettymux/shell-integration.sh || true
          cp packaging/prettymux.desktop AppDir/usr/share/applications/prettymux.desktop
          # Create a simple icon for AppImage
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          convert -size 256x256 xc:transparent -fill '#cba6f7' -font DejaVu-Sans-Mono-Bold \
            -pointsize 180 -gravity center -annotate 0 '>_' \
            AppDir/usr/share/icons/hicolor/256x256/apps/prettymux.png 2>/dev/null || \
          echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" rx="40" fill="#1e1e2e"/><text x="128" y="170" font-family="monospace" font-size="140" fill="#cba6f7" text-anchor="middle">>_</text></svg>' > AppDir/usr/share/icons/hicolor/256x256/apps/prettymux.svg

      - name: Build AppImage
        uses: AppImageCrafters/build-appimage@v1
        with:
          recipe: packaging/AppImageBuilder.yml
        env:
          UPDATE_INFO: gh-releases-zsync|patcito|prettymux|latest|PrettyMux-*x86_64.AppImage.zsync

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: prettymux-appimage
          path: '*.AppImage'

