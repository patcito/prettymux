  # ---------------------------------------------------------------------------
  # Release (runs on version tags only)
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux-ubuntu-lts
      - build-linux-fedora
      - build-linux-deb
      - build-snap
      - build-flatpak
      - build-archlinux
      - publish-ppa
      - build-appimage
      # - build-windows      # DISABLED: GTK4+WebKitGTK is Linux-only
      # - build-macos        # DISABLED: GTK4+WebKitGTK is Linux-only
      # - build-macos-intel  # DISABLED: GTK4+WebKitGTK is Linux-only
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for git log)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          echo "$CHANGELOG" > changelog.txt
          echo "Generated changelog with $(echo "$CHANGELOG" | wc -l) entries"

      - name: Gather release assets
        run: |
          mkdir -p release-assets

          # Ubuntu tarballs
          cp artifacts/prettymux-ubuntu-24.04-amd64/*.tar.gz release-assets/ || true

          # Fedora RPM
          cp artifacts/prettymux-fedora-rpm/*.rpm release-assets/ || true

          # Debian .deb
          cp artifacts/prettymux-deb/*.deb release-assets/ || true

          # Snap
          cp artifacts/prettymux-snap/*.snap release-assets/ || true

          # Flatpak
          cp artifacts/prettymux-flatpak/*.flatpak release-assets/ || true

          # Arch Linux
          cp artifacts/prettymux-archlinux/*.pkg.tar.zst release-assets/ || true
          if [ -d artifacts/prettymux-pkgbuild ]; then
            tar czf release-assets/prettymux-archlinux-PKGBUILD.tar.gz -C artifacts/prettymux-pkgbuild .
          fi

          # AppImage
          cp artifacts/prettymux-appimage/*.AppImage release-assets/ || true

          # Windows
          cp artifacts/prettymux-windows-x64/*.zip release-assets/ || true

          # macOS
          cp artifacts/prettymux-macos-arm64/*.dmg release-assets/ || true
          cp artifacts/prettymux-macos-x64/*.dmg release-assets/ || true

          echo "Release assets:"
          ls -lh release-assets/

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qiE '(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PrettyMux ${{ github.ref_name }}
          body_path: changelog.txt
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: false
