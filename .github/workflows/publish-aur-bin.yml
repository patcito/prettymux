name: Publish AUR Bin

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish from, for example v0.2.10'
        required: true
        type: string

jobs:
  publish-aur-bin:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/patcito/prettymux-build-archlinux:latest
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout prettymux
        uses: actions/checkout@v5

      - name: Publish prettymux-bin to AUR
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          set -euo pipefail

          pacman -Sy --noconfirm --needed openssh shadow
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          ASSET="prettymux-${VERSION}-1-x86_64.pkg.tar.zst"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET}"
          curl -fsSL "$ASSET_URL" -o "/tmp/${ASSET}"
          SHA256="$(sha256sum "/tmp/${ASSET}" | awk '{print $1}')"

          id -u aurbuilder >/dev/null 2>&1 || useradd -m -U aurbuilder
          install -d -m 700 -o aurbuilder -g aurbuilder /home/aurbuilder/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/aurbuilder/.ssh/aur
          chmod 600 /home/aurbuilder/.ssh/aur
          ssh-keyscan -H -t rsa,ecdsa,ed25519 aur.archlinux.org > /home/aurbuilder/.ssh/known_hosts
          chmod 600 /home/aurbuilder/.ssh/known_hosts
          cat > /home/aurbuilder/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile /home/aurbuilder/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile /home/aurbuilder/.ssh/known_hosts
          EOF
          chmod 600 /home/aurbuilder/.ssh/config
          chown -R aurbuilder:aurbuilder /home/aurbuilder/.ssh

          su - aurbuilder -c 'git config --global user.name "prettymux-bot"'
          su - aurbuilder -c 'git config --global user.email "prettymux-bot@users.noreply.github.com"'

          rm -rf /tmp/aur-prettymux-bin
          if su - aurbuilder -c 'git ls-remote ssh://aur@aur.archlinux.org/prettymux-bin.git >/dev/null 2>&1'; then
            su - aurbuilder -c 'git clone ssh://aur@aur.archlinux.org/prettymux-bin.git /tmp/aur-prettymux-bin'
          else
            install -d -m 755 -o aurbuilder -g aurbuilder /tmp/aur-prettymux-bin
            su - aurbuilder -c 'git init -b master /tmp/aur-prettymux-bin'
            su - aurbuilder -c 'cd /tmp/aur-prettymux-bin && git remote add origin ssh://aur@aur.archlinux.org/prettymux-bin.git'
          fi

          sed \
            -e "s/@@VERSION@@/${VERSION}/g" \
            -e "s/@@SHA256@@/${SHA256}/g" \
            packaging/PKGBUILD-bin.in > /tmp/aur-prettymux-bin/PKGBUILD

          chown -R aurbuilder:aurbuilder /tmp/aur-prettymux-bin
          su - aurbuilder -c '
            cd /tmp/aur-prettymux-bin &&
            makepkg --printsrcinfo > .SRCINFO &&
            git add PKGBUILD .SRCINFO &&
            if git diff --cached --quiet; then
              echo "No prettymux-bin changes to publish"
              exit 0
            fi &&
            git commit -m "Update prettymux-bin to '"${VERSION}"'" &&
            git push origin master
          '
